<html lang="en">
<head>

  <link rel="stylesheet" href="https://googleapis.com">
  <style>
    :root { --navy: #222554; --light-bg: #f0f2f5; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    body { background: var(--light-bg); display: flex; justify-content: center; min-height: 100vh; }
    
    .container { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

    .header-container{ width:100%; background-image: linear-gradient(#3A3963, #1A1B4B); display:  flex; justify-content :  center; padding:   30px 0px; border-radius:  0% 0% 10% 10%;}

    /* Top Side: Image Header */
    .header-img { width: 80%; display: block;  }

    /* Center Part: Frame Area */
    .canvas-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 30px 20px; }
    .canvas-wrapper { border-radius: 20px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.1); line-height: 0; }
    #twibbonCanvas { background: #eee; cursor: grab; max-width: 100%; height: auto; touch-action: none; }

    /* Controls: Buttons and Slider */
    .controls { padding: 10px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .action-row { display: flex; gap: 15px; align-items: center; }
    
    .icon-btn { 
      width: 60px; height: 60px; background: var(--navy); border: none; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; color: white;
    }
    .icon-btn svg { width: 30px; height: 30px; fill: white; }
    
    .slider-container { width: 90%; }
    #scaleSlider { width: 100%; accent-color: var(--navy); height: 6px; cursor: pointer; }

    /* Download Footer */
    .footer-action { padding: 20px; }
    .download-btn {
      width: 100%; background: var(--navy); color: white; padding: 18px; border: none;
      border-radius: 8px; font-size: 1.3rem; font-weight: 800; letter-spacing: 2px; cursor: pointer;
    }
    .download-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /*Footer*/
         .footer{ margin-top: 15px; padding-top: 12px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 12px; font-size: 12px; color: #555; justify-content: center; } 
         .footer-img{ width: 50px; height: 50px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--primary); } 
         .footer-img img{ width: 100%; height: 100%; object-fit: cover; } 
         .footer-text a{ color: var(--primary); text-decoration: none; font-weight: 600; } 
         .footer-text a:hover{ text-decoration: underline; }

  </style>
</head>
<body>

<div class="container">
  <!-- 1. Header Image -->
  <div class="header-container">
  <img src="./title.svg" class="header-img" alt="Header">
  </div>
  <!-- 2. Canvas -->
  <div class="canvas-area">
    <div class="canvas-wrapper">
      <canvas id="twibbonCanvas"></canvas>
    </div>
  </div>

  <!-- 3. Action Controls -->
  <div class="controls">
    <div class="action-row">
      <button class="icon-btn" id="rotateLeftBtn">
        <svg id="Layer_2" data-name="Layer 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 98.07 107.02"><defs><style>.cls-1 {fill: #f2f2f2;}</style></defs><g id="Layer_1-2" data-name="Layer 1"><path class="cls-1" d="m48.07,7.02c-9.8,0-19.4,2.91-27.52,8.27L15.18,0C13.13,12,6.44,27.2,0,38.17c12.04-4.11,28.28-7.62,40.44-7.23l-13.34-7.98c6.27-3.86,13.55-5.94,20.97-5.94,22.06,0,40,17.94,40,40s-17.94,40-40,40c-10.68,0-20.73-4.16-28.28-11.71-3.1-3.1-5.66-6.67-7.6-10.58l-8.96,4.43c2.42,4.9,5.61,9.34,9.49,13.22,9.44,9.44,22,14.64,35.35,14.64,27.57,0,50-22.43,50-50S75.64,7.02,48.07,7.02Z"/></g></svg>
      </button>

      <label for="userPhoto" class="icon-btn">
        <svg id="Layer_2" data-name="Layer 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 114 84.5"><defs><style> .cls-1 { fill: #f2f2f2; }</style></defs><g id="Layer_1-2" data-name="Layer 1">
<g><path class="cls-1" d="m57,24c-11.87,0-21.5,9.63-21.5,21.5s9.63,21.5,21.5,21.5,21.5-9.63,21.5-21.5-9.63-21.5-21.5-21.5Zm0,40.66c-10.58,0-19.16-8.58-19.16-19.16s8.58-19.16,19.16-19.16,19.16,8.58,19.16,19.16-8.58,19.16-19.16,19.16Z"/><circle class="cls-1" cx="57" cy="45.5" r="6.08"/><path class="cls-1" d="m102,6.5H33v-3.17c0-1.84-1.49-3.33-3.33-3.33h-8.34c-1.84,0-3.33,1.49-3.33,3.33v3.17h-6C5.4,6.5,0,11.9,0,18.5v54c0,6.6,5.4,12,12,12h90c6.6,0,12-5.4,12-12V18.5c0-6.6-5.4-12-12-12Zm-45,62c-12.7,0-23-10.3-23-23s10.3-23,23-23,23,10.3,23,23-10.3,23-23,23Zm43.5-43.5c-3.59,0-6.5-2.91-6.5-6.5s2.91-6.5,6.5-6.5,6.5,2.91,6.5,6.5-2.91,6.5-6.5,6.5Z"/></g></g></svg>
      </label>
      <input type="file" id="userPhoto" accept="image/*" style="display:none">

      <button class="icon-btn" id="rotateRightBtn">
        <svg id="Layer_2" style="transform: scaleX(-1);" data-name="Layer 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 98.07 107.02"><defs><style>.cls-1 {fill: #f2f2f2;}</style></defs><g id="Layer_1-2" data-name="Layer 1"><path class="cls-1" d="m48.07,7.02c-9.8,0-19.4,2.91-27.52,8.27L15.18,0C13.13,12,6.44,27.2,0,38.17c12.04-4.11,28.28-7.62,40.44-7.23l-13.34-7.98c6.27-3.86,13.55-5.94,20.97-5.94,22.06,0,40,17.94,40,40s-17.94,40-40,40c-10.68,0-20.73-4.16-28.28-11.71-3.1-3.1-5.66-6.67-7.6-10.58l-8.96,4.43c2.42,4.9,5.61,9.34,9.49,13.22,9.44,9.44,22,14.64,35.35,14.64,27.57,0,50-22.43,50-50S75.64,7.02,48.07,7.02Z"/></g></svg>
      </button>
    </div>

    <!-- Scaler Button / Range -->
    <div class="slider-container">
      <input type="range" id="scaleSlider" min="0.1" max="2" step="0.01" value="1">
    </div>
  </div>

  <!-- 4. Download Button -->
  <div class="footer-action">
    <button class="download-btn" id="downloadBtn" disabled>DOWNLOAD</button>
  </div>

<!--Footer - MPK Brandign -->

</div>

<script>
  const canvas = document.getElementById('twibbonCanvas');
  const ctx = canvas.getContext('2d');
  const EXPORT_SIZE = 1080;
  const DISPLAY_SIZE = 350; // Size on phone screen
  const SCALE_RATIO = EXPORT_SIZE / DISPLAY_SIZE;

  canvas.width = DISPLAY_SIZE;
  canvas.height = DISPLAY_SIZE;

  let userImg = new Image(), frameImg = new Image();
  let dragging = false, offsetX = 0, offsetY = 0;
  let pos = { x: 50, y: 50 }, scale = 1, rotation = 0;
  let userImgLoaded = false;

  // Load Frame (Replace with your direct PNG link)
  frameImg.crossOrigin = "anonymous";
  frameImg.onload = () => draw();
  frameImg.src = './participant_frame.png';

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (userImgLoaded) {
      ctx.save();
      const w = userImg.width * scale;
      const h = userImg.height * scale;
      ctx.translate(pos.x + w/2, pos.y + h/2);
      ctx.rotate(rotation * Math.PI / 180);
      ctx.drawImage(userImg, -w/2, -h/2, w, h);
      ctx.restore();
    }
    ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
  }

  document.getElementById('userPhoto').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (f) => {
      userImg = new Image();
      userImg.onload = () => {
        userImgLoaded = true;
        scale = DISPLAY_SIZE / userImg.width;
        document.getElementById('scaleSlider').value = scale;
        draw();
        document.getElementById('downloadBtn').disabled = false;
      };
      userImg.src = f.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
  };

  // Buttons & Slider
  document.getElementById('rotateLeftBtn').onclick = () => { rotation -= 90; draw(); };
  document.getElementById('rotateRightBtn').onclick = () => { rotation += 90; draw(); };
  document.getElementById('scaleSlider').oninput = (e) => { scale = parseFloat(e.target.value); draw(); };

  // Mouse/Touch Dragging
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - r.left, y: cy - r.top };
  }

  canvas.onmousedown = canvas.ontouchstart = (e) => {
    if (!userImgLoaded) return;
    dragging = true;
    const m = getPos(e);
    offsetX = m.x - pos.x; offsetY = m.y - pos.y;
    if(e.type === 'touchstart') e.preventDefault();
  };

  window.onmousemove = window.ontouchmove = (e) => {
    if (!dragging) return;
    const m = getPos(e);
    pos.x = m.x - offsetX; pos.y = m.y - offsetY;
    draw();
  };
  window.onmouseup = window.ontouchend = () => dragging = false;

     // 5. Mouse Wheel & Pinch Zoom Logic
  canvas.addEventListener('wheel', (e) => {
    if (!userImgLoaded) return;
        e.preventDefault();
    const delta = e.deltaY < 0 ? 1.05 : 0.95;
    let newScale = scale * delta;
    if (newScale >= 0.1 && newScale <= 3) {
      scale = newScale;
      document.getElementById('scaleSlider').value = scale;
      draw();
    }
  }, { passive: false });

  canvas.ondblclick = () => {
    if (!userImgLoaded) return;
    scale = DISPLAY_SIZE / userImg.width;
    document.getElementById('scaleSlider').value = scale;
    draw();
  };

  let initialPinchDist = null;

  // Helper to calculate distance between two fingers
  function getPinchDist(e) {
    return Math.hypot(
      e.touches[0].pageX - e.touches[1].pageX,
      e.touches[0].pageY - e.touches[1].pageY
    );
  }

  canvas.addEventListener('touchstart', (e) => {
    if (!userImgLoaded) return;
    
    if (e.touches.length === 1) {

      dragging = true;
      const m = getPos(e.touches[0]);
      offsetX = m.x - pos.x;
      offsetY = m.y - pos.y;
    } else if (e.touches.length === 2) {

      dragging = false; 
      initialPinchDist = getPinchDist(e);
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    if (!userImgLoaded) return;

    if (e.touches.length === 1 && dragging) {

      const m = getPos(e.touches[0]);
      pos.x = m.x - offsetX;
      pos.y = m.y - offsetY;
      draw();
    } else if (e.touches.length === 2 && initialPinchDist) {

      const currentDist = getPinchDist(e);
      const diff = currentDist / initialPinchDist;
      

      let newScale = scale * diff;
      

      if (newScale > 0.05 && newScale < 3) {
        scale = newScale;
        document.getElementById('scaleSlider').value = scale;
        draw();
      }
      initialPinchDist = currentDist; 
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    dragging = false;
    initialPinchDist = null;
  });


  // High-Res Download
  document.getElementById('downloadBtn').onclick = () => {
    const out = document.createElement('canvas');
    out.width = EXPORT_SIZE; out.height = EXPORT_SIZE;
    const octx = out.getContext('2d');
    
    const w = (userImg.width * scale) * SCALE_RATIO;
    const h = (userImg.height * scale) * SCALE_RATIO;
    octx.save();
    octx.translate((pos.x * SCALE_RATIO) + w/2, (pos.y * SCALE_RATIO) + h/2);
    octx.rotate(rotation * Math.PI / 180);
    octx.drawImage(userImg, -w/2, -h/2, w, h);
    octx.restore();
    octx.drawImage(frameImg, 0, 0, EXPORT_SIZE, EXPORT_SIZE);

    const a = document.createElement('a');
    a.download = 'umariyyah_photo.png';
    a.href = out.toDataURL('image/png', 1.0);
    a.click();
  };
</script>
